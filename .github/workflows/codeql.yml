# GitHub CodeQL: statische Sicherheits-Analyse für JavaScript/TypeScript.
# Findet u.a. SQL-Injection, XSS, Hardcoded Secrets, Insecure Random,
# Path Traversal, SSRF. Läuft bei jedem Push auf main und wöchentlich.
name: CodeQL Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 2 * * 1"   # Montags 03:30 Berlin

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript"]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
